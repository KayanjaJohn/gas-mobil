version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: gas-mobil-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: gas-mobil
    volumes:
      - mongodb_data:/data/db
    networks:
      - gas-mobil-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: gas-mobil-api
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/gas-mobil?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      STRIPE_SECRET_KEY: sk_test_your_stripe_secret_key
    volumes:
      - ./apps/api/src:/app/src
    networks:
      - gas-mobil-network
    command: npm run dev

  redis:
    image: redis:7-alpine
    container_name: gas-mobil-redis
    ports:
      - '6379:6379'
    networks:
      - gas-mobil-network

volumes:
  mongodb_data:

networks:
  gas-mobil-network:
    driver: bridge
